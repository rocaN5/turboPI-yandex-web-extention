<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Box + Паллета — финал</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background-color: #e8e8e8; }
        #info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            font-family: monospace;
            font-size: 16px;
            padding: 6px 14px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.25);
            z-index: 100;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            padding: 16px 30px;
            border-radius: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            flex-wrap: wrap;
            justify-content: center;
            z-index: 200;
            border: 1px solid rgba(255,255,255,0.5);
            font-weight: 500;
        }
        .controls label {
            font-weight: 600;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
        }
        input[type=range] { 
            width: 140px; 
            height: 5px; 
            background: #d0d0d0; 
            border-radius: 10px;
            accent-color: #ff9900;
        }
        input[type=checkbox] {
            width: 18px;
            height: 18px;
            accent-color: #ff9900;
            margin-right: 5px;
            border-radius: 10px;
        }
        button {
            background: #ff9900;
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: background 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }
        button:hover {
            background: #ff9900;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="info">FPS: <span id="fpsValue">60</span></div>
    
    <div class="controls">
        <label>📏 X <input type="range" id="sizeX" min="50" max="1200" value="300"></label>
        <label>📐 Y <input type="range" id="sizeY" min="50" max="1200" value="300"></label>
        <label>📦 Z <input type="range" id="sizeZ" min="50" max="1200" value="300"></label>
        <label style="margin-left:5px">
            <input type="checkbox" id="palletCheck" checked> 🪵 Паллета
        </label>
        <label style="margin-left:5px">
            <input type="checkbox" id="rulersCheck" checked> 📏 Линейки
        </label>
        <label style="margin-left:5px">
            <input type="checkbox" id="rotateCheck" checked> 🔄 Вращение
        </label>
        <button id="randomBtn">🎲 Случайный размер</button>
    </div>

    <script type="module">
        import * as THREE from '../libs/three/three.module.js';
        import { OrbitControls } from '../libs/three/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe8e8e8);

        const camera = new THREE.PerspectiveCamera(45, 800/550, 1, 5000);
        camera.position.set(600, 300, 800);
        camera.lookAt(0, 150, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(800, 550);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = false;
        renderer.setClearColor(0xe8e8e8);
        document.body.appendChild(renderer.domElement);
        renderer.physicallyCorrectLights = true;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        // 🌤 Мягкий небесный свет
        const hemiLight = new THREE.HemisphereLight(
            0xe8e8e8,  // цвет неба
            0xe8e8e8,  // цвет земли
            1.0        // интенсивность
        );
        scene.add(hemiLight);

        // ☀ Основное солнце
        const sunLight = new THREE.DirectionalLight(0xffffff, 3.5);
        sunLight.position.set(2, 20, 2);
        scene.add(sunLight);

        // 🌅 Мягкая подсветка сзади
        const fillLight = new THREE.DirectionalLight(0xffffff, 1.2);
        fillLight.position.set(-4, 3, -4);
        scene.add(fillLight);

        const cubeGroup = new THREE.Group();
        const palletGroup = new THREE.Group();
        const rulersGroup = new THREE.Group();
        scene.add(cubeGroup);
        scene.add(palletGroup);
        scene.add(rulersGroup);

        let cubeWidth = 300, cubeHeight = 300, cubeDepth = 300;
        
        // сетка
        const gridHelper = new THREE.GridHelper(2000, 20, 0x777777, 0x999999);
        gridHelper.position.y = 0;
        gridHelper.material.opacity = 0.35;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // ========== ТОЧНЫЙ SVG ==========
        const svgString = `<?xml version="1.0" encoding="UTF-8"?>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 612" fill="#00000044">
            <path d="M612,553.586v32.107c0,5.911-4.792,10.702-10.702,10.702H10.702C4.792,596.396,0,591.604,0,585.693v-32.107   c0-5.91,4.792-10.702,10.702-10.702h590.596C607.208,542.884,612,547.675,612,553.586z M122.021,491.431h53.512   c11.821,0,21.405-9.583,21.405-21.404V202.131h34.823c16.478,0,26.776-17.839,18.536-32.109L167.305,26.305   c-8.24-14.268-28.834-14.267-37.073,0.001L47.255,170.023c-8.239,14.27,2.059,32.107,18.537,32.107h34.825v267.896   C100.617,481.848,110.2,491.431,122.021,491.431z M443.104,491.431h53.512c11.821,0,21.404-9.583,21.404-21.404V202.131h34.827   c16.478,0,26.776-17.839,18.535-32.109L488.39,26.305c-8.239-14.268-28.834-14.267-37.072,0.001l-82.977,143.717   c-8.239,14.27,2.06,32.107,18.536,32.107h34.821v267.896C421.698,481.848,431.282,491.431,443.104,491.431z"/>
        </svg>`;
        
        const base64SVG = btoa(unescape(encodeURIComponent(svgString)));
        const dataUri = 'data:image/svg+xml;base64,' + base64SVG;

        const iconImage = new Image();
        iconImage.src = dataUri;

        // Создаём иконку с адаптивным размером
        function createIconSprite(size, margin) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            if (iconImage.complete) {
                ctx.drawImage(iconImage, 0, 0, 128, 128);
            } else {
                iconImage.onload = () => updateAllIcons();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.MeshBasicMaterial({ 
                map: texture,
                transparent: true,
                side: THREE.DoubleSide,
                depthTest: true,
                depthWrite: false
            });
            
            const geometry = new THREE.PlaneGeometry(size, size);
            const mesh = new THREE.Mesh(geometry, material);
            
            mesh.userData = { isIcon: true };
            return mesh;
        }

        function updateAllIcons() {
            cubeGroup.children.forEach(child => {
                if (child.userData && child.userData.isIcon) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 128;
                    canvas.height = 128;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(iconImage, 0, 0, 128, 128);
                    child.material.map = new THREE.CanvasTexture(canvas);
                    child.material.needsUpdate = true;
                }
            });
        }

        // ===== СОЗДАНИЕ КУБА С ИКОНКАМИ =====
        function createCubeWithIcons(w, h, d) {
            while(cubeGroup.children.length) cubeGroup.remove(cubeGroup.children[0]);
            
            const material = new THREE.MeshPhongMaterial({
                color: 0xb78d5a,
                shininess: 18,
                side: THREE.DoubleSide
            });
            const geometry = new THREE.BoxGeometry(w, h, d);
            const cube = new THREE.Mesh(geometry, material);
            cube.castShadow = true;
            cube.position.y = h / 2;
            cubeGroup.add(cube);
            
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x5d3a1a }));
            line.position.y = h / 2;
            cubeGroup.add(line);
            
            const baseMargin = 15;
            const baseIconSize = 50;
            
            const minRequired = baseIconSize + 2 * baseMargin;
            const scaleFactor = Math.min(1, Math.min(h, w, d) / minRequired);
            
            const iconSize = Math.max(15, baseIconSize * scaleFactor);
            const margin = Math.max(4, baseMargin * scaleFactor);
            
            const epsilon = 0.5;
            
            // Левая грань (X-)
            const iconLeft = createIconSprite(iconSize, margin);
            iconLeft.position.set(-w/2 - epsilon, h - margin - iconSize/2, -d/2 + margin + iconSize/2);
            iconLeft.rotation.y = -Math.PI/2;
            cubeGroup.add(iconLeft);
            
            // Правая грань (X+)
            const iconRight = createIconSprite(iconSize, margin);
            iconRight.position.set(w/2 + epsilon, h - margin - iconSize/2, d/2 - margin - iconSize/2);
            iconRight.rotation.y = Math.PI/2;
            cubeGroup.add(iconRight);
            
            // Передняя грань (Z+)
            const iconFront = createIconSprite(iconSize, margin);
            iconFront.position.set(-w/2 + margin + iconSize/2, h - margin - iconSize/2, d/2 + epsilon);
            iconFront.rotation.y = 0;
            cubeGroup.add(iconFront);
            
            // Задняя грань (Z-)
            const iconBack = createIconSprite(iconSize, margin);
            iconBack.position.set(w/2 - margin - iconSize/2, h - margin - iconSize/2, -d/2 - epsilon);
            iconBack.rotation.y = Math.PI;
            cubeGroup.add(iconBack);
        }

        // ===== РАЗМЕРНЫЕ ЛИНЕЙКИ =====
        function createRulers(w, h, d, yOffset) {
            while(rulersGroup.children.length) rulersGroup.remove(rulersGroup.children[0]);
            
            const offset = 10;
            const textOffset = 5;
            const colors = { x: 0xff0000, y: 0x00ff00, z: 0x0000ff };
            
            function addRuler(points, color, value, corner1, corner2, labelOffset, normalDir) {
                const start = points[0];
                const end = points[1];
                
                const lineGeo = new THREE.BufferGeometry().setFromPoints([start, end]);
                const lineMat = new THREE.LineBasicMaterial({ color: color });
                const line = new THREE.Line(lineGeo, lineMat);
                rulersGroup.add(line);
                
                const extLine1Geo = new THREE.BufferGeometry().setFromPoints([corner1, start]);
                const extLine1 = new THREE.Line(extLine1Geo, lineMat);
                rulersGroup.add(extLine1);
                
                const extLine2Geo = new THREE.BufferGeometry().setFromPoints([corner2, end]);
                const extLine2 = new THREE.Line(extLine2Geo, lineMat);
                rulersGroup.add(extLine2);
                
                const mid = new THREE.Vector3().lerpVectors(start, end, 0.5);
                mid.add(labelOffset);
                mid.add(normalDir.clone().multiplyScalar(textOffset));
                
                const canvas = document.createElement('canvas');
                canvas.width = 1024;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
                ctx.font = 'bold 160px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(value + ' см', 512, 256);
                
                const texture = new THREE.CanvasTexture(canvas);
                const material = new THREE.SpriteMaterial({ 
                    map: texture, 
                    depthTest: true,
                    transparent: true,
                    opacity: 1
                });
                const sprite = new THREE.Sprite(material);
                sprite.scale.set(240, 120, 1);
                sprite.position.copy(mid);
                rulersGroup.add(sprite);
            }
            
            // X линейка – передняя грань, верхнее ребро
            const xStart = new THREE.Vector3(-w/2, yOffset + h, d/2 + offset);
            const xEnd = new THREE.Vector3(w/2, yOffset + h, d/2 + offset);
            addRuler([xStart, xEnd], colors.x, (w/10).toFixed(0),
                new THREE.Vector3(-w/2, yOffset + h, d/2),
                new THREE.Vector3(w/2, yOffset + h, d/2),
                new THREE.Vector3(0, 30, 0),
                new THREE.Vector3(0, 0, 1));
            
            // Z линейка – правая грань, верхнее ребро
            const zStart = new THREE.Vector3(w/2 + offset, yOffset + h, -d/2);
            const zEnd = new THREE.Vector3(w/2 + offset, yOffset + h, d/2);
            addRuler([zStart, zEnd], colors.z, (d/10).toFixed(0),
                new THREE.Vector3(w/2, yOffset + h, -d/2),
                new THREE.Vector3(w/2, yOffset + h, d/2),
                new THREE.Vector3(0, 30, 0),
                new THREE.Vector3(1, 0, 0));
            
            // Y линейка – на передне-правом углу
            const yStart = new THREE.Vector3(w/2 + offset, yOffset, d/2 + offset);
            const yEnd = new THREE.Vector3(w/2 + offset, yOffset + h, d/2 + offset);
            addRuler([yStart, yEnd], colors.y, (h/10).toFixed(0),
                new THREE.Vector3(w/2, yOffset, d/2),
                new THREE.Vector3(w/2, yOffset + h, d/2),
                new THREE.Vector3(30, 0, 30),
                new THREE.Vector3(1, 0, 1).normalize());
        }

        // --- паллета с гвоздями (темнее) ---
        function createPallet() {
            while(palletGroup.children.length) palletGroup.remove(palletGroup.children[0]);
            
            const palletColor = 0x8B5A2B;
            const woodMaterial = new THREE.MeshPhongMaterial({ color: palletColor, shininess: 8 });
            const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x5d3a1a });
            
            const width = 1200;
            const depth = 800;
            const boardThick = 22;
            const legHeight = 145;
            const legWidth = 145;
            const legDepth = 145;
            const topBoardCount = 5;
            
            const totalHeight = legHeight + boardThick * 2;
            
            function addBoard(geo, posX, posY, posZ) {
                const board = new THREE.Mesh(geo, woodMaterial);
                board.position.set(posX, posY, posZ);
                palletGroup.add(board);
                
                const edges = new THREE.EdgesGeometry(geo);
                const line = new THREE.LineSegments(edges, edgeMaterial);
                line.position.set(posX, posY, posZ);
                palletGroup.add(line);
            }
            
            // Верхние доски
            const topY = totalHeight - boardThick/2;
            for (let i = 0; i < topBoardCount; i++) {
                const z = -depth/2 + depth/(topBoardCount+1) * (i+1);
                const geo = new THREE.BoxGeometry(width, boardThick, boardThick * 4.5);
                addBoard(geo, 0, topY, z);
                
                // Гвозди по углам верхних досок (темнее)
                const nailPositions = [
                    [-width/2 + 30, topY + boardThick/2.5, z - boardThick*2.25 + 15],
                    [ width/2 - 30, topY + boardThick/2.5, z - boardThick*2.25 + 15],
                    [-width/2 + 30, topY + boardThick/2.5, z + boardThick*2.25 - 15],
                    [ width/2 - 30, topY + boardThick/2.5, z + boardThick*2.25 - 15]
                ];
                nailPositions.forEach(pos => {
                    const nailGeo = new THREE.CylinderGeometry(4, 4, 8, 8);
                    const nailMat = new THREE.MeshStandardMaterial({ color: 0x555555, emissive: 0x111111 });
                    const nail = new THREE.Mesh(nailGeo, nailMat);
                    nail.position.set(pos[0], pos[1], pos[2]);
                    nail.rotation.x = 0;
                    palletGroup.add(nail);
                });
            }
            
            // Нижние доски
            const bottomY = boardThick/2;
            const bottomZPos = [-depth/3, 0, depth/3];
            bottomZPos.forEach(z => {
                const geo = new THREE.BoxGeometry(width, boardThick, boardThick * 4.5);
                addBoard(geo, 0, bottomY, z);
            });
            
            // Поперечные доски
            const crossY = totalHeight - boardThick - boardThick/2;
            const crossXPos = [-width/2.25, 0, width/2.25];
            crossXPos.forEach(x => {
                const geo = new THREE.BoxGeometry(boardThick * 5.5, boardThick, depth * 0.8);
                addBoard(geo, x, crossY, 0);
            });
            
            // Опоры
            const legY = boardThick + legHeight/2.5;
            const legXPos = [-width/2.25, 0, width/2.25];
            const legZPos = [-depth/3, 0, depth/3];
            legXPos.forEach(x => {
                legZPos.forEach(z => {
                    const geo = new THREE.BoxGeometry(legWidth * 0.7, legHeight * 0.85, legDepth * 0.7);
                    addBoard(geo, x, legY, z);
                });
            });
            
            palletGroup.position.y = 0;
        }

        // Обновление всего
        function updateAll() {
            const palletVisible = document.getElementById('palletCheck').checked;
            const rulersVisible = document.getElementById('rulersCheck').checked;
            
            const yOffset = palletVisible ? 190 : 0;
            
            createCubeWithIcons(cubeWidth, cubeHeight, cubeDepth);
            cubeGroup.position.y = yOffset;
            
            palletGroup.visible = palletVisible;
            
            if (rulersVisible) {
                createRulers(cubeWidth, cubeHeight, cubeDepth, yOffset);
            } else {
                while(rulersGroup.children.length) rulersGroup.remove(rulersGroup.children[0]);
            }
            
            if (typeof controls !== 'undefined') {
                controls.target.set(0, yOffset + cubeHeight/2, 0);
            }
        }

        // --- Инициализация ---
        createPallet();
        
        // Настройка камеры
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = true; // начальное состояние
        controls.autoRotateSpeed = -1.2;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.0;
        controls.minDistance = 200;
        controls.maxDistance = 2500;
        controls.enablePan = false;
        controls.target.set(0, 190 + cubeHeight/2, 0);
        controls.maxPolarAngle = Math.PI / 2.2;

        updateAll();

        // UI
        document.getElementById('sizeX').addEventListener('input', (e) => {
            cubeWidth = +e.target.value;
            updateAll();
        });
        document.getElementById('sizeY').addEventListener('input', (e) => {
            cubeHeight = +e.target.value;
            updateAll();
        });
        document.getElementById('sizeZ').addEventListener('input', (e) => {
            cubeDepth = +e.target.value;
            updateAll();
        });
        
        document.getElementById('palletCheck').addEventListener('change', updateAll);
        document.getElementById('rulersCheck').addEventListener('change', updateAll);

        // Чекбокс вращения
        const rotateCheck = document.getElementById('rotateCheck');
        rotateCheck.addEventListener('change', (e) => {
            controls.autoRotate = e.target.checked;
        });

        // Кнопка случайных значений
        document.getElementById('randomBtn').addEventListener('click', () => {
            const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
            cubeWidth = rand(50, 1200);
            cubeHeight = rand(50, 1200);
            cubeDepth = rand(50, 1200);
            
            document.getElementById('sizeX').value = cubeWidth;
            document.getElementById('sizeY').value = cubeHeight;
            document.getElementById('sizeZ').value = cubeDepth;
            
            updateAll();
        });

        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            renderer.render(scene, camera);
            
            frames++;
            const now = performance.now();
            const delta = now - lastTime;
            if (delta >= 1000) {
                fpsSpan.textContent = Math.round((frames * 1000) / delta);
                frames = 0;
                lastTime = now;
            }
        }
        
        animate();
    </script>
</body>
</html>
